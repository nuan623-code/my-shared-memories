<style>
  body { margin: 0; padding: 20px; background: #fff; }
.agent-arch { position: relative; width: 100%; max-width: 1600px; margin: 0 auto; --blue: #2D6BFF; --blue-strong: #1F5EFF; }
.agent-arch__canvas svg { width: 100%; height: auto; display: block; }
.agent-arch.is-animated #arr-user-runtime line,.agent-arch.is-animated #arr-runtime-loop line,.agent-arch.is-animated #arr-context-model line,.agent-arch.is-animated #arr-model-outputs path,.agent-arch.is-animated #arr-split-answer path,.agent-arch.is-animated #arr-split-toolcall path,.agent-arch.is-animated #arr-toolcall-observe line { stroke-dasharray: 11 9; animation: flowDash 0.9s linear infinite; }
.agent-arch.is-animated .loop-arc path { stroke-dasharray: 20 12; animation: flowDash 1.15s linear infinite; }
.agent-arch.is-animated #loop-ring-inner { stroke-dasharray: 5 15; transform-box: fill-box; transform-origin: center; animation: spin 44s linear infinite; }
.agent-arch.is-animated #loop-halo { transform-box: fill-box; transform-origin: center; animation: breathe 6s ease-in-out infinite; }
.agent-arch.is-animated .loop-node > circle { transform-box: fill-box; transform-origin: center; }
.agent-arch.is-animated #loop-think > circle { animation: loopPulse 4.4s ease-in-out infinite; }
.agent-arch.is-animated #loop-plan > circle { animation: loopPulse 4.4s ease-in-out infinite; animation-delay: 1.1s; }
.agent-arch.is-animated #loop-act > circle { animation: loopPulse 4.4s ease-in-out infinite; animation-delay: 2.2s; }
.agent-arch.is-animated #loop-observe > circle { animation: loopPulse 4.4s ease-in-out infinite; animation-delay: 3.3s; }
.agent-arch.is-animated .runtime-item > rect { animation: cellGlow 4.2s ease-in-out infinite; }
.agent-arch.is-animated #rt-memory > rect { animation-delay: .28s; } .agent-arch.is-animated #rt-context > rect { animation-delay: .56s; } .agent-arch.is-animated #rt-budget > rect { animation-delay: .84s; } .agent-arch.is-animated #rt-loop > rect { animation-delay: 1.12s; } .agent-arch.is-animated #rt-retry > rect { animation-delay: 1.4s; } .agent-arch.is-animated #rt-dispatch > rect { animation-delay: 1.68s; }
.agent-arch.is-animated .context-block { transform-box: fill-box; transform-origin: center; animation: floatUp 3.2s ease-in-out infinite; }
.agent-arch.is-animated #ctx-instr-1 { animation-delay: .16s; } .agent-arch.is-animated #ctx-history-2 { animation-delay: .32s; } .agent-arch.is-animated #ctx-memory-3 { animation-delay: .48s; } .agent-arch.is-animated #ctx-toolcall-4 { animation-delay: .64s; } .agent-arch.is-animated #ctx-rag-5 { animation-delay: .8s; } .agent-arch.is-animated #ctx-schema-6 { animation-delay: .96s; } .agent-arch.is-animated #ctx-scratch-7 { animation-delay: 1.12s; }
.agent-arch.is-animated [id^="arr-ctx-"] path { stroke-dasharray: 4 6; animation: flowDash 0.85s linear infinite; }
.agent-arch.is-animated #context-container > rect { animation: cellGlow 3.2s ease-in-out infinite; }
.agent-arch.is-animated #arr-act-resources line,.agent-arch.is-animated [id^="arr-act-res-"] path { animation: flowDash 1.1s linear infinite; }
.agent-arch.is-animated #out-toolcall > rect { transform-box: fill-box; transform-origin: center; animation: toolPulse 2.2s ease-in-out infinite; }
.agent-arch.is-animated #rt-dispatch > rect { animation: cellGlow 2.2s ease-in-out infinite; }
.agent-arch.is-animated #arr-observation-feedback path { animation: flowDash 1.6s linear infinite; }
.agent-arch .sidebar-item,.agent-arch .runtime-item,.agent-arch .loop-node,.agent-arch .resource-card,.agent-arch .context-block,.agent-arch .model-pill,.agent-arch .output-card,.agent-arch #request-card,.agent-arch #user-node,.agent-arch #observation-node { transform-box: fill-box; transform-origin: center; transition: transform .28s cubic-bezier(.2,.7,.3,1), filter .28s ease; cursor: pointer; }
.agent-arch.is-overview .runtime-item:hover,.agent-arch.is-overview .loop-node:hover,.agent-arch.is-overview .resource-card:hover,.agent-arch.is-overview .context-block:hover,.agent-arch.is-overview .output-card:hover,.agent-arch.is-overview #user-node:hover { transform: scale(1.045); filter: drop-shadow(0 10px 22px rgba(31,94,255,.20)); }
@keyframes flowDash { to { stroke-dashoffset: -40; } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes breathe { 0%,100% { opacity: .40; transform: scale(1); } 50% { opacity: .62; transform: scale(1.015); } }
@keyframes loopPulse { 0%,78%,100% { stroke: #1F5EFF; stroke-width: 2; transform: scale(1); filter: none; } 10% { stroke: #1F5EFF; stroke-width: 4; transform: scale(1.05); filter: drop-shadow(0 0 14px rgba(31,94,255,.55)); } 22% { stroke: #1F5EFF; stroke-width: 2.6; transform: scale(1.02); } }
@keyframes cellGlow { 0%,70%,100% { stroke: #DDE3EC; stroke-width: 1.5; filter: none; } 12% { stroke: #2D6BFF; stroke-width: 2.4; filter: drop-shadow(0 0 10px rgba(45,107,255,.40)); } }
@keyframes floatUp { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
@keyframes toolPulse { 0%,100% { stroke: #DDE3EC; stroke-width: 1.5; filter: none; } 50% { stroke: #2D6BFF; stroke-width: 2.6; filter: drop-shadow(0 0 16px rgba(45,107,255,.45)); } }
.agent-arch__bar { display: flex; justify-content: flex-end; padding: 2px 2px 12px; }
.agent-arch__seg { display: inline-flex; gap: 2px; padding: 3px; background: #F2F6FF; border: 1.5px solid #C9DAFF; border-radius: 999px; font-family: -apple-system,'SF Pro Display',Inter,'Segoe UI',system-ui,sans-serif; }
.agent-arch__seg button { border: 0; background: transparent; cursor: pointer; border-radius: 999px; padding: 7px 16px; font: 600 13px/1 inherit; color: #5B6472; }
.agent-arch__seg button.on { background: #fff; color: var(--blue-strong); box-shadow: 0 1px 4px rgba(31,94,255,.18); }
.agent-arch__stage { position: relative; }
.agent-arch.is-walk .agent-arch__stage { height: min(72vh, 820px); overflow-y: auto; overflow-x: hidden; border: 1px solid #E7ECF5; border-radius: 16px; background: #fff; }
.agent-arch__caption { margin-top: 14px; padding: 18px 20px; border: 1.5px solid #E7ECF5; border-radius: 16px; background: linear-gradient(180deg,#FAFBFF,#F3F7FF); font-family: -apple-system,'SF Pro Display',Inter,'Segoe UI',system-ui,sans-serif; }
.agent-arch__dots { display: flex; gap: 8px; margin-bottom: 12px; }
.agent-arch__dots button { width: 26px; height: 26px; border-radius: 50%; cursor: pointer; border: 1.5px solid #C9DAFF; background: #fff; color: #9AA3B2; font: 600 12px/1 inherit; transition: all .2s; }
.agent-arch__dots button.on { background: var(--blue); border-color: var(--blue); color: #fff; transform: scale(1.08); }
.agent-arch__title { margin: 0 0 6px; font: 700 19px/1.3 -apple-system,'SF Pro Display',Inter,'Segoe UI',system-ui,sans-serif; color: #0B1220; }
.agent-arch__text { margin: 0 0 16px; font: 400 15.5px/1.75 -apple-system,'SF Pro Display',Inter,'Segoe UI',system-ui,sans-serif; color: #46505F; max-width: 70ch; }
.agent-arch__text strong { color: var(--blue-strong); font-weight: 700; }
.agent-arch__nav { display: flex; gap: 10px; flex-wrap: wrap; }
.agent-arch__nav button { cursor: pointer; border-radius: 10px; padding: 9px 16px; font: 600 14px/1 -apple-system,'SF Pro Display',Inter,'Segoe UI',system-ui,sans-serif; border: 1.5px solid #DDE3EC; background: #fff; color: #46505F; }
.agent-arch__nav button.primary { background: var(--blue); border-color: var(--blue); color: #fff; }
.agent-arch__nav button.ghost { color: var(--blue-strong); }
.agent-arch.is-walk .agent-arch__canvas svg > g,.agent-arch.is-walk .agent-arch__canvas svg > text { opacity: .09; transition: opacity .5s ease; }
.agent-arch.is-walk .agent-arch__canvas svg > g.is-hot,.agent-arch.is-walk .agent-arch__canvas svg > text.is-hot { opacity: 1; }
.agent-arch.is-walk #grid-fine,.agent-arch.is-walk #grid-major { opacity: .16; }

.agent-arch.is-walk .is-live > circle { transform-box: fill-box; transform-origin: center; animation: loopPulse 1.9s ease-in-out infinite; }
.agent-arch__tip { position: absolute; z-index: 30; pointer-events: none; max-width: 300px; padding: 12px 14px; border-radius: 12px; background: #fff; border: 1.5px solid #C9DAFF; box-shadow: 0 12px 30px rgba(11,18,32,.14); font-family: -apple-system,'SF Pro Display',Inter,'Segoe UI',system-ui,sans-serif; opacity: 0; transform: translateY(4px); transition: opacity .14s ease, transform .14s ease; }
.agent-arch__tip.show { opacity: 1; transform: translateY(0); }
.agent-arch__tip .t { font-size: 14px; font-weight: 700; color: var(--blue-strong); margin-bottom: 4px; }
.agent-arch__tip .d { font-size: 13px; line-height: 1.6; color: #46505F; }
.agent-arch__tip .e { font-size: 12.5px; line-height: 1.6; color: #6B7686; margin-top: 6px; }
.agent-arch__tip .e b { color: #46505F; font-weight: 600; }
</style>

<script>
const STEPS = [
  { title:"① 用户提出请求", html:"用户用大白话说出需求 —— 比如「帮我查下昨天的销量,再写一段总结」。Agent 拿到的是<strong>自然语言</strong>,不是写死的代码。整个流程从这句话开始。", hot:["lbl-user","user-node","request-node","arr-user-runtime"], scrollTo:"user-node" },
  { title:"② Runtime 接手,推理循环启动", html:"<strong>Runtime(运行时框架)</strong>接过请求,启动一个持续运转的<strong>推理循环</strong>。第一步是 <strong>Think(思考)</strong>:模型先想清楚「我该干嘛、下一步做什么」。(复杂任务还会先 Plan 规划一下。)", hot:["runtime-region","arr-runtime-loop","reasoning-loop"], scrollTo:"loop-think", live:"loop-think" },
  { title:"③ Act:动用技能与工具", html:"循环走到 <strong>Act(行动)</strong> 时,Agent 调用手头的<strong>资源</strong>:技能(写代码 / 分析 / 写作)、固定工作流,以及外部工具 / MCP(GitHub、浏览器、SQL、Slack…)。这是它「真正动手做事」的地方。", hot:["reasoning-loop","arr-act-resources","lbl-resources","resources-region"], scrollTo:"resources-region", live:"loop-act" },
  { title:"④ 拼装上下文,喂给模型", html:"每一轮,系统都把此刻相关的信息<strong>临时拼装</strong>成一个「上下文窗口」:系统提示 + 指令 + 历史 + 记忆 + 工具结果 + 检索资料 + 工具说明…… 这是模型<strong>唯一能看到</strong>的东西 —— 拼进去什么,决定它能答什么。", hot:["lbl-ctx","context-builder","arr-context-model"], scrollTo:"context-builder" },
  { title:"⑤ 模型产出:回答,或再调工具", html:"<strong>基础模型(Claude / GPT / Gemini…)</strong>读完上下文开始推理,给出两种结果之一:<strong>Final Answer(最终答案)</strong> —— 任务完成;或 <strong>Tool Call(工具调用)</strong> —— 「我还需要再调一个工具」。", hot:["foundation-model","arr-model-outputs","arr-split-answer","out-answer","arr-split-toolcall","out-toolcall"], scrollTo:"foundation-model" },
  { title:"⑥ 观察结果,回灌成闭环", html:"工具跑完的结果被 <strong>Observe(观察)</strong>,再顺着 <strong>feedback</strong> 回流到 Runtime,开启<strong>下一轮循环</strong>。Think → Act → Observe 就这样转圈,直到模型认为任务完成、给出最终答案 —— 这就是 Agent「自己想、自己做、自己纠错」的核心。", hot:["out-toolcall","arr-toolcall-observe","observation-node","arr-observation-feedback","lbl-feedback","reasoning-loop"], scrollTo:"observation-node", live:"loop-observe" },
];
function scrollStageTo(stage,target,duration=480){const start=stage.scrollTop,max=stage.scrollHeight-stage.clientHeight,dist=Math.max(0,Math.min(max,target))-start;if(Math.abs(dist)<1)return;const t0=performance.now(),ease=p=>p<.5?2*p*p:1-Math.pow(-2*p+2,2)/2;function frame(now){const p=Math.min(1,(now-t0)/duration);stage.scrollTop=start+dist*ease(p);if(p<1)requestAnimationFrame(frame);}requestAnimationFrame(frame);}
const root=document.getElementById('root'), canvas=document.getElementById('canvas'), stage=canvas.parentElement;
let mode='walk', step=0, playing=false, timer=null;
const dots=document.getElementById('dots');
STEPS.forEach((s,i)=>{ const b=document.createElement('button'); b.textContent=i+1; b.onclick=()=>{stopPlay();go(i);}; dots.appendChild(b); });
function render(){
  root.className='agent-arch '+(mode==='walk'?'is-walk':'is-overview is-animated'); root.dataset.step=step+1;
  document.getElementById('m-walk').className=mode==='walk'?'on':''; document.getElementById('m-over').className=mode==='overview'?'on':'';
  document.getElementById('caption').style.display=mode==='walk'?'':'none';
  [...canvas.querySelectorAll('.is-hot,.is-live')].forEach(e=>e.classList.remove('is-hot','is-live'));
  [...dots.children].forEach((d,i)=>d.className=i===step?'on':'');
  if(mode!=='walk')return;
  const s=STEPS[step]; document.getElementById('ttl').textContent=s.title; document.getElementById('txt').innerHTML=s.html;
  document.getElementById('play').textContent=playing?'⏸ 暂停':'▶ 自动播放';
  document.getElementById('next').textContent=step===STEPS.length-1?'↺ 重头看':'下一步 →';
  s.hot.forEach(id=>{const e=canvas.querySelector('#'+id); if(e)e.classList.add('is-hot');});
  if(s.live){const e=canvas.querySelector('#'+s.live); if(e)e.classList.add('is-live');}
  const t=canvas.querySelector('#'+s.scrollTo);
  if(t){requestAnimationFrame(()=>{const tr=t.getBoundingClientRect(), sr=stage.getBoundingClientRect();scrollStageTo(stage,stage.scrollTop+(tr.top+tr.height/2)-(sr.top+sr.height/2));});}
}
function go(i){ step=(i+STEPS.length)%STEPS.length; render(); }
function stopPlay(){ playing=false; if(timer){clearInterval(timer);timer=null;} }
document.getElementById('prev').onclick=()=>{stopPlay();go(step-1);};
document.getElementById('next').onclick=()=>{stopPlay();go(step+1);};
document.getElementById('play').onclick=()=>{ playing=!playing; if(playing){timer=setInterval(()=>go(step+1),5200);} else {clearInterval(timer);timer=null;} render(); };
document.getElementById('m-walk').onclick=()=>{stopPlay();mode='walk';render();};
document.getElementById('m-over').onclick=()=>{stopPlay();mode='overview';render();};

 'out-toolcall':{t:'Tool Call 工具调用',d:'模型决定再调一个工具,而不是直接作答。',e:'「调用 query 工具执行这段 SQL」。'},
 'observation-node':{t:'Observation 观察结果',d:'对工具结果的观察,会回灌进下一轮循环。',e:'看到返回 1,240,数据正常,继续。'}
};
function findDef(n){ while(n&&n!==root){ if(n.id&&DEFS[n.id])return n.id; n=n.parentNode; } return null; }
root.addEventListener('mousemove',e=>{
  const id=findDef(e.target);
  if(!id){ tip.classList.remove('show'); return; }
  const D=DEFS[id];
  tip.innerHTML='<div class="t">'+D.t+'</div><div class="d">'+D.d+'</div><div class="e"><b>例子:</b> '+D.e+'</div>';
  tip.classList.add('show');
  const wr=root.getBoundingClientRect(), tw=tip.offsetWidth, th=tip.offsetHeight;
  let x=e.clientX-wr.left+16, y=e.clientY-wr.top+16;
  if(e.clientX+tw+28>window.innerWidth) x=e.clientX-wr.left-tw-16;
  if(e.clientY+th+28>window.innerHeight) y=e.clientY-wr.top-th-16;
  if(x<4)x=4; if(y<4)y=4;
  tip.style.left=x+'px'; tip.style.top=y+'px';
});
root.addEventListener('mouseleave',()=>tip.classList.remove('show'));
(function init(){
  const svg=canvas.querySelector('svg');
  const byText=(x)=>[...svg.querySelectorAll('text')].filter(e=>e.textContent.trim()===x);
  const u=byText('User').find(e=>e.getAttribute('font-size')==='26'); if(u)u.setAttribute('id','lbl-user');
  const r=byText('Resources')[0]; if(r)r.setAttribute('id','lbl-resources');
  const c=byText('Dynamic Model Context')[0]; if(c)c.setAttribute('id','lbl-ctx');
  const f=byText('feedback')[0]; if(f)f.setAttribute('id','lbl-feedback');
  render();
})();
</script>
